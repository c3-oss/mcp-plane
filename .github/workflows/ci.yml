name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    name: commit + docs + secrets
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Install Node tooling
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Lint commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: devbox run -- pnpm exec commitlint --config commitlint.config.cjs --from "$BASE_SHA" --to "$HEAD_SHA"

      - name: Run quality gates
        env:
          # Lychee falls back to anonymous GitHub requests without this, and
          # private c3-oss repos return 404 to anonymous lookups.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: devbox run -- just quality

  test:
    name: tidy + vet + test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ubuntu-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ubuntu-go-

      - name: Tidy check
        run: devbox run -- just tidy-check

      - name: Vet
        run: devbox run -- just vet

      - name: Test
        run: devbox run -- go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: golangci-lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Run golangci-lint
        run: devbox run -- just lint

  security:
    name: gosec + govulncheck
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Static security analysis (gosec)
        run: devbox run -- just lint-sec

      - name: Set up Go for govulncheck
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Vulnerability scan (govulncheck)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build:
    name: build / ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runs-on: blacksmith-2vcpu-ubuntu-2404
          - os: macos-latest
            runs-on: blacksmith-6vcpu-macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Cache Go modules and build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
          key: ${{ matrix.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ matrix.os }}-go-

      - name: Build
        run: devbox run -- just build
