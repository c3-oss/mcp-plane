name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # actions/setup-node@v6 enables Corepack when package.json declares
      # `packageManager`, which prepares the pinned pnpm. Without pnpm on
      # PATH, the action fails — so install pnpm explicitly first. The
      # npm publish step itself uses `npm publish`, not pnpm.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # package-manager-cache: false skips the pnpm-cache save step
      # that fails on this job with "Path Validation Error: Path(s)
      # specified in the action for caching do(es) not exist". We
      # don't run `pnpm install` here so the cache directory never
      # materializes; the publish step uses `npm publish` directly.
      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Publish npm packages
        run: ./scripts/publish-npm.sh
        env:
          # NPM_TOKEN is a granular access token scoped to the
          # @c3-oss org; required to publish @c3-oss/mcp-plane and
          # the four platform sub-packages.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: mcp-plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
